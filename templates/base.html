<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Villa Manager{% endblock %}</title>
<style>
  :root {
    --navy: #1B4F72;
    --navy-light: #2E86C1;
    --gold: #F39C12;
    --green: #27AE60;
    --red: #E74C3C;
    --bg: #F4F7FA;
    --card: #FFFFFF;
    --border: #DDE3EA;
    --text: #1A2332;
    --muted: #6B7A8D;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(27,79,114,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Nav */
  nav { background: var(--navy); padding: 0 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .nav-brand { color: white; font-weight: 700; font-size: 1.1rem; padding: 16px 0; margin-right: 16px; text-decoration: none; }
  .nav-brand span { color: var(--gold); }
  nav a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 18px 14px; font-size: 0.9rem; display: inline-block; transition: color 0.2s; }
  nav a:hover, nav a.active { color: white; border-bottom: 3px solid var(--gold); }

  /* Layout */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .page-title { font-size: 1.6rem; font-weight: 700; color: var(--navy); margin-bottom: 20px; }

  /* Cards */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 16px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

  /* Stat boxes */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border-left: 4px solid var(--navy); }
  .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--navy); }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat.gold { border-left-color: var(--gold); }
  .stat.green-border { border-left-color: var(--green); }
  .stat.red-border { border-left-color: var(--red); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-success { background: var(--green); color: white; }
  .btn-success:hover { opacity: 0.9; }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { opacity: 0.9; }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
  .btn-outline { background: transparent; border: 2px solid var(--navy); color: var(--navy); }
  .btn-outline:hover { background: var(--navy); color: white; }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th { background: var(--navy); color: white; padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.03em; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #F0F5FA; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge-unpaid { background: #FDEBD0; color: #A04000; }
  .badge-paid { background: #D5F5E3; color: #1E8449; }
  .badge-owner { background: #D6EAF8; color: #1A5276; }
  .badge-tenant { background: #E8DAEF; color: #6C3483; }
  .badge-short { background: #FDEDEC; color: #922B21; }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=date], select {
    width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
    font-size: 1rem; transition: border 0.2s; background: white;
  }
  input:focus, select:focus { outline: none; border-color: var(--navy-light); }
  .reading-input { width: 130px !important; font-size: 1.1rem !important; font-weight: 600; text-align: right; }

  /* Section headers */
  .section-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }

  /* Mobile */
  @media (max-width: 600px) {
    .stat-value { font-size: 1.2rem; }
    .page-title { font-size: 1.3rem; }
    nav a { padding: 12px 10px; font-size: 0.82rem; }
    .btn { padding: 10px 14px; }
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">Villa<span>Manager</span></a>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>📊 Dashboard</a>
  <a href="/readings" {% if request.path == '/readings' %}class="active"{% endif %}>📟 Readings</a>
  <a href="/invoices" {% if request.path == '/invoices' %}class="active"{% endif %}>🧾 Invoices</a>
  <a href="/expenses" {% if request.path == '/expenses' %}class="active"{% endif %}>💰 Expenses</a>
  <a href="/villas" {% if request.path == '/villas' %}class="active"{% endif %}>🏠 Villas</a>
</nav>
{% block content %}{% endblock %}
</body>
</html>
